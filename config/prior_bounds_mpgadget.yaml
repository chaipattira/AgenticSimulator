# Prior bounds for the MP-Gadget phase (sub-project 2 of the MP-Gadget extension).
# Schema per docs/superpowers/specs/2026-07-13-mpgadget-wrapper-design.md: `parameters`,
# `resolution`, `k_vector` are that spec's documented shape. `fixed`, `noise`, `chi2`,
# `budget` are sub-project-2 additions (see design doc section 1 and "Open decisions").
#
# Fiducial values (shenqi/examples/small/paramfile.genic + paramfile.gadget):
#   om=0.2814  ob=0.0464  sigma8=0.810  h=0.697  ns=0.971  w0=-1.0 (implicit LCDM)
#   wind_energy_fraction=1.0  wind_speed_factor=3.7  bh_feedback_factor=0.05
parameters:
  om:                    {min: 0.20, max: 0.40}
  ob:                    {min: 0.03, max: 0.06}
  sigma8:                {min: 0.60, max: 1.00}
  wind_energy_fraction:  {min: 0.5,  max: 2.0}
  wind_speed_factor:     {min: 2.0,  max: 6.0}
  bh_feedback_factor:    {min: 0.01, max: 0.15}
fiducial:
  om: 0.2814
  ob: 0.0464
  sigma8: 0.810
  wind_energy_fraction: 1.0
  wind_speed_factor: 3.7
  bh_feedback_factor: 0.05
# h, ns, w0 stay fixed at these fiducial values throughout the MP-Gadget phase — never
# agent-selectable, never included in --params. Used by SyrenAnsatz and by
# MPGadgetOracle's theta_fid draw.
fixed:
  h: 0.697
  ns: 0.971
  w0: -1.0
resolution:
  ngrid:        {min: 48,   max: 64}
  box_size_kpc: {min: 4000, max: 8000}
k_vector:
  logspace_start: 0.301029995663981   # log10(2)
  logspace_end: 1.1760912590556813    # log10(15)
  n_points: 25
noise:
  sigma_frac: 0.02          # fixed 2% observational noise floor on obs_pk.npy (MPGadgetOracle)
  ansatz_sigma0: 0.02       # fixed fractional noise on SyrenAnsatz's free pre-screening output
                            # (NOT cpu_hours-dependent — no realization-noise dial exists here)
chi2:
  epsilon: 50.0             # same threshold convention as the syren_new MVP; provisional —
                             # not re-derived for the 25-point MP-Gadget k-grid
budget:
  # MPGadgetSimulator's provisional SLURM request (sub-project 1 spec): ntasks=8,
  # cpus_per_task=2 -> 16 cores/job x 2 jobs (genic+gadget) x <=30 min walltime each
  # -> ~16 cpu_hours upper bound per trial. 200 cpu_hours budgets for roughly 10-25 real
  # trials depending on how close to the walltime cap each run actually lands -- provisional,
  # not empirically measured (see design doc's open risks).
  max_cpu_hours: 200.0
